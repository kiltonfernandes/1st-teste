<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Counter App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="counter-card">
    <h1>Simple Counter App</h1>
    <p>Each click increments the number below by one.</p>
    <div id="count" class="count-display">0</div>
    <div class="button-row">
      <button id="increment" class="primary-btn">Click me</button>
      <button id="reset" class="ghost-btn">Reset</button>
    </div>
  </main>
  <script src="counter.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
